<!DOCTYPE html>
<html>
<head>
<title>Students</title>
</head>

<body>

<h2>Student List</h2>

<form method="GET" action="/students">
<input type="text" name="q" placeholder="Search student..." />
<button type="submit">Search</button>
</form>

<br>

<table border="1">
<tr>
<th>ID</th>
<th>Name</th>
<th>Class</th>
<th>Roll</th>
<th>Action</th>
</tr>

{% for s in students %}
<tr>
<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
<td>{{s[3]}}</td>

<td>
<a href="/edit/{{s[0]}}">Edit</a> |
<a href="/delete/{{s[0]}}" onclick="return confirm('Are you sure?')">Delete</a>
</td>

</tr>
{% endfor %}
</table>

</body>
</html>
