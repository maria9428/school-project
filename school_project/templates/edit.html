<!DOCTYPE html>
<html>
<head>
<title>Edit Student</title>
</head>

<body>

<h2>Edit Student</h2>

<form action="/update/{{student[0]}}" method="POST">

<input type="text" name="name" value="{{student[1]}}" required><br><br>

<input type="text" name="class" value="{{student[2]}}" required><br><br>

<input type="text" name="roll" value="{{student[3]}}" required><br><br>

<button type="submit">Update</button>

</form>

</body>
</html>
