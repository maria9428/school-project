<!DOCTYPE html>
<html>
<head>
<title>School Dashboard</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:40px;
}

.card{
    background:white;
    width:220px;
    margin:20px;
    padding:30px;
    text-align:center;
    border-radius:10px;
    box-shadow:0px 0px 10px #ccc;
}

.card a{
    text-decoration:none;
    color:#2c3e50;
    font-weight:bold;
}

.card:hover{
    transform:scale(1.05);
}

</style>

</head>

<body>

<header>
<h1>School Admin Dashboard</h1>
<p>St. Mary's Bal Bharati School</p>
</header>

<div class="container">

<div class="card">
<h3>Add Student</h3>
<a href="/">Open</a>
</div>

<div class="card">
<h3>View Students</h3>
<a href="/students">Open</a>
</div>

<div class="card">
<h3>Attendance</h3>
<a href="#">Coming Soon</a>
</div>

<div class="card">
<h3>Results</h3>
<a href="#">Coming Soon</a>
</div>

</div>

</body>
</html>
